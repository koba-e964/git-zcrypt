[package]
name = "git-zcrypt"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Git clean/smudge filter that compresses and encrypts file contents"

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.51", features = ["derive"] }

[dev-dependencies]
tempfile = "3.23.0"
